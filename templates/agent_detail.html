<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Досье агента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="card bg-secondary p-4">
        <h2>{{ agent.code_name }}</h2>
        <hr>
        <p><strong>ID:</strong> {{ agent.id }}</p>
        <p><strong>Телефон:</strong> {{ agent.phone }}</p>
        <p><strong>Email:</strong> {{ agent.email }}</p>
        <p><strong>Уровень доступа:</strong> {{ agent.access_level }}</p>

        <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-warning">Редактировать</a>
        <a href="{{ url_for('index') }}" class="btn btn-light">Назад</a>
    </div>
</div>

</body>
</html>
