<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Редактировать агента</h2>

    <form method="POST" class="card p-4 bg-secondary">
        <input type="text" name="code_name" value="{{ agent.code_name }}" class="form-control mb-3" required>
        <input type="text" name="phone" value="{{ agent.phone }}" class="form-control mb-3">
        <input type="email" name="email" value="{{ agent.email }}" class="form-control mb-3">

        <select name="access_level" class="form-control mb-3">
            <option {% if agent.access_level == "Секретно" %}selected{% endif %}>Секретно</option>
            <option {% if agent.access_level == "Совершенно секретно" %}selected{% endif %}>Совершенно секретно</option>
            <option {% if agent.access_level == "Особый доступ" %}selected{% endif %}>Особый доступ</option>
        </select>

        <button class="btn btn-primary">Обновить</button>
        <a href="{{ url_for('agent_detail', id=agent.id) }}" class="btn btn-light">Назад</a>
    </form>
</div>

</body>
</html>
