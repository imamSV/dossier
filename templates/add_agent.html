<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Добавить нового агента</h2>

    <form method="POST" class="card p-4 bg-secondary">

        <div class="input-group mb-3">
            <input type="text"
                   id="code_name"
                   name="code_name"
                   placeholder="Кодовое имя"
                   class="form-control"
                   required>

            <button type="button"
                    class="btn btn-info"
                    onclick="generateName()">
                🎲
            </button>
        </div>

        <input type="text" name="phone" placeholder="Телефон" class="form-control mb-3">
        <input type="email" name="email" placeholder="Email" class="form-control mb-3">

        <select name="access_level" class="form-control mb-3">
            <option>Секретно</option>
            <option>Совершенно секретно</option>
            <option>Особый доступ</option>
        </select>

        <button class="btn btn-success">Сохранить</button>
        <a href="{{ url_for('index') }}" class="btn btn-light">Назад</a>
    </form>
</div>

<script src="{{ url_for('static', filename='js/random_name.js') }}"></script>

</body>
</html>
