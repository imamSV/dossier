<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Secret Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">🕵 Доступ к Д.С.А.П.</h1>

    <div class="text-center mb-3">
        <a href="{{ url_for('add_agent') }}" class="btn btn-success">
            ➕ Добавить агента
        </a>
    </div>

<form method="POST" action="{{ url_for('nuclear_mode') }}" class="text-center mb-3">
    <button class="btn btn-danger"
            onclick="return confirm('ВНИМАНИЕ! Уничтожить ВСЕ досье?')">
         СЕКРЕТНЫЙ РЕЖИМ
    </button>
</form>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Кодовое имя</th>
                <th>Уровень доступа</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for agent in agents %}
            <tr>
                <td>{{ agent.id }}</td>
                <td>
                    <a href="{{ url_for('agent_detail', id=agent.id) }}" class="text-info">
                        {{ agent.code_name }}
                    </a>
                </td>
                <td>{{ agent.access_level }}</td>
                <td>
                    <a href="{{ url_for('edit_agent', id=agent.id) }}" class="btn btn-warning btn-sm">✏</a>
                    <a href="{{ url_for('delete_agent', id=agent.id) }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Уничтожить досье?')">🗑</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
